<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="../js/reg&log_validation.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="box">
            <h2>Login</h2>
            <p class="subtitle">Welcome back! Please enter your details</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input id="loginemail" type="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group" >
                    <label>Password</label>
                    <input id="loginpassword" type="password" placeholder="Enter your password" required>
                </div>
                
                <div class="row">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn">Sign in</button>
            </form>
            
            <div class="footer">
                <p>Don't have an account? <a href="register.html" class="link">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
